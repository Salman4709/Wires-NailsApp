<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <!-- ═══ SEO & Identity ═══ -->
  <title>سلك ومسمار</title>
  <meta name="description" content="نظام إدارة التوزيع — سلك ومسمار">
  <meta name="application-name" content="سلك ومسمار">

  <!-- ═══ PWA Manifest ═══ -->
  <link rel="manifest" href="manifest.json">

  <!-- ═══ iOS / Safari PWA ═══ -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="سلك ومسمار">
  <link rel="apple-touch-icon" href="icons/Nails.x1.png">
  <link rel="apple-touch-icon" sizes="256x256" href="icons/Nails.x5@0.5x.png">
  <link rel="apple-touch-icon" sizes="128x128" href="icons/Nails.x25@0.25x.png">

  <!-- ═══ Status Bar Color ═══ -->
  <meta name="theme-color" content="#1F2421">
  <meta name="msapplication-navbutton-color" content="#1F2421">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- ═══ Favicon ═══ -->
  <link rel="icon" type="image/png" sizes="512x512" href="icons/Nails.x1.png">
  <link rel="icon" type="image/png" sizes="256x256" href="icons/Nails.x5@0.5x.png">
  <link rel="icon" type="image/png" sizes="128x128" href="icons/Nails.x25@0.25x.png">

  <style>
    /* ═══════════════════════════════════════════
       Reset & Full-Screen Shell
    ════════════════════════════════════════════ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --status-bar:  #1F2421;
      /* ألوان التطبيق — بيج رملي دافئ */
      --splash-bg:   #F4F1DE;   /* خلفية Splash = خلفية التطبيق */
      --splash-text: #221F1C;   /* نص داكن قريب من الأنثراسيت */
      --splash-sub:  #6B6459;   /* نص ثانوي بني رمادي دافئ */
      --accent:      #B85A3C;   /* تراكوتا — لون الـ spinner */
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--status-bar);
    }

    /* ── Safe-area insets (iPhone notch / Dynamic Island) ── */
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    /* ── Full-screen iframe ── */
    #app-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
      background: var(--splash-bg);
    }

    /* ── Splash screen shown while iframe loads ── */
    #splash {
      position: fixed;
      inset: 0;
      background: var(--splash-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 9999;
      transition: opacity 0.45s ease, visibility 0.45s ease;
    }

    #splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #splash img {
      width: 100px;
      height: 100px;
      border-radius: 24px;
      box-shadow: 0 6px 24px rgba(184, 90, 60, 0.25);
      animation: pulse 1.8s ease-in-out infinite;
    }

    #splash p {
      color: var(--splash-sub);
      font-family: 'Alexandria', 'Segoe UI', Tahoma, sans-serif;
      font-size: 14px;
      letter-spacing: 0.4px;
    }

    #splash-title {
      color: var(--splash-text);
      font-family: 'Alexandria', 'Segoe UI', Tahoma, sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1);     box-shadow: 0 6px 24px rgba(184,90,60,0.25); }
      50%       { transform: scale(1.06); box-shadow: 0 10px 32px rgba(184,90,60,0.40); }
    }

    /* ── Loading spinner (تراكوتا) ── */
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(184, 90, 60, 0.15);
      border-top-color: #B85A3C;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Error state ── */
    #error-box {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 32px;
      text-align: center;
    }

    #error-box p {
      color: #A1382A;
      font-family: 'Alexandria', 'Segoe UI', Tahoma, sans-serif;
      font-size: 14px;
      line-height: 1.7;
    }

    #error-box button {
      background: #1F2421;
      color: #F4F1DE;
      border: none;
      border-radius: 10px;
      padding: 10px 28px;
      font-size: 14px;
      font-family: 'Alexandria', 'Segoe UI', Tahoma, sans-serif;
      cursor: pointer;
      transition: background 0.2s;
    }

    #error-box button:hover {
      background: #2d3530;
    }
  </style>
</head>
<body>

  <!-- ── Splash Screen ── -->
  <div id="splash">
    <img src="icons/Nails.x1.png" alt="سلك ومسمار" id="splash-icon">
    <div id="splash-title">سلك ومسمار</div>

    <div id="loading-indicator">
      <div class="spinner"></div>
    </div>
    <p id="splash-msg">جاري تحميل التطبيق...</p>

    <div id="error-box">
      <p id="error-msg">
        تعذّر تحميل التطبيق.<br>
        تأكد من اتصال الإنترنت وأنك مسجّل في حساب Google.
      </p>
      <button onclick="reloadApp()">إعادة المحاولة</button>
    </div>
  </div>

  <!-- ── App iframe ── -->
  <iframe
    id="app-frame"
    src="about:blank"
    title="سلك ومسمار — نظام إدارة التوزيع"
    allow="fullscreen"
    sandbox="allow-scripts allow-forms allow-same-origin allow-popups allow-popups-to-escape-sandbox allow-storage-access-by-user-activation"
  ></iframe>

  <script>
    /* ════════════════════════════════════════════
       Configuration
    ════════════════════════════════════════════ */
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbxo-XSR5GBzFezLOnWwmsQ6gY0siD_IxYV02QqT4u8VsI48KUkHHMQAoYGKPifCxi65/exec';

    /* ════════════════════════════════════════════
       Screen Orientation Lock (Portrait)
    ════════════════════════════════════════════ */
    function lockPortrait() {
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('portrait').catch(function() {
          // Browser may deny lock outside of fullscreen — ignore silently
        });
      }
    }

    /* ════════════════════════════════════════════
       Fullscreen (Android Chrome — hides browser bar)
    ════════════════════════════════════════════ */
    function requestFullscreen() {
      var el = document.documentElement;
      if (el.requestFullscreen)            el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    }

    /* ════════════════════════════════════════════
       Splash Management
    ════════════════════════════════════════════ */
    var LOAD_TIMEOUT_MS = 30000;  // 30 seconds
    var timeoutHandle   = null;
    var splashHidden    = false;

    function hideSplash() {
      if (splashHidden) return;
      splashHidden = true;
      clearTimeout(timeoutHandle);
      document.getElementById('splash').classList.add('hidden');
    }

    function showError(msg) {
      clearTimeout(timeoutHandle);
      document.getElementById('loading-indicator').style.display = 'none';
      document.getElementById('splash-msg').style.display        = 'none';
      document.getElementById('error-box').style.display         = 'flex';
      if (msg) document.getElementById('error-msg').textContent  = msg;
    }

    function reloadApp() {
      splashHidden = false;
      document.getElementById('loading-indicator').style.display = 'flex';
      document.getElementById('splash-msg').style.display        = 'block';
      document.getElementById('error-box').style.display         = 'none';
      document.getElementById('splash').classList.remove('hidden');
      loadApp();
    }

    /* ════════════════════════════════════════════
       iframe Loading
       — يُخفي شاشة التحميل الداخلية للـ GAS
         بحقن CSS عبر postMessage بعد التحميل
    ════════════════════════════════════════════ */
    function loadApp() {
      var frame = document.getElementById('app-frame');

      frame.onload  = null;
      frame.onerror = null;
      frame.src = 'about:blank';

      timeoutHandle = setTimeout(function() {
        showError('انتهت مهلة تحميل التطبيق.\nتأكد من اتصال الإنترنت وأنك مسجّل في حساب Google ثم أعد المحاولة.');
      }, LOAD_TIMEOUT_MS);

      frame.onload = function() {
        // إخفاء شاشة التحميل الداخلية للـ GAS بعد تحميل الـ iframe
        // نستخدم تأخيراً أطول بعض الشيء لضمان تحميل DOM الداخلي كاملاً
        setTimeout(function() {
          try {
            // محاولة إخفاء #loader داخل الـ iframe مباشرة (يعمل فقط إذا كان نفس الـ origin)
            var innerDoc = frame.contentDocument || frame.contentWindow.document;
            var loader   = innerDoc && innerDoc.getElementById('loader');
            if (loader) {
              loader.style.display     = 'none';
              loader.style.visibility  = 'hidden';
              loader.style.opacity     = '0';
            }
          } catch(e) {
            // Cross-origin — لا يمكن الوصول للـ DOM الداخلي، وهذا متوقع
          }
          hideSplash();
        }, 800);
      };

      frame.onerror = function() {
        showError();
      };

      frame.src = GAS_URL;
    }

    /* ════════════════════════════════════════════
       Back Button — زر الرجوع
       المنطق:
       · عند التحميل نُضيف history entry واحداً
         حتى يُقاطع الضغط الأول على الرجوع.
       · عند popstate (الضغط على الرجوع) نُعيد
         الـ entry ونسأل المستخدم عن الخروج.
       · إذا أكّد الخروج → history.go(-2) أو
         window.close() حسب الحالة.
    ════════════════════════════════════════════ */
    var backPressCount  = 0;
    var backResetTimer  = null;

    function setupBackButton() {
      // أضف entry واحداً في الـ history ليمتص ضغطة الرجوع الأولى
      history.pushState({ pwa: true }, '');

      window.addEventListener('popstate', function(e) {
        // أعد الـ entry حتى يكون الزر متاحاً للضغطة التالية
        history.pushState({ pwa: true }, '');

        backPressCount++;
        clearTimeout(backResetTimer);
        backResetTimer = setTimeout(function() { backPressCount = 0; }, 2000);

        if (backPressCount >= 2) {
          // ضغطتان متتاليتان خلال ثانيتين → خروج
          backPressCount = 0;
          window.close();
          // للأجهزة التي لا تستجيب لـ window.close():
          history.go(-(history.length));
        } else {
          // ضغطة أولى → أظهر تلميحاً
          showBackToast();
        }
      });
    }

    /* ── Toast "اضغط مرة أخرى للخروج" ── */
    var toastEl = null;
    var toastTimer = null;

    function showBackToast() {
      if (!toastEl) {
        toastEl = document.createElement('div');
        toastEl.style.cssText = [
          'position:fixed',
          'bottom:32px',
          'left:50%',
          'transform:translateX(-50%)',
          'background:#1F2421',
          'color:#F4F1DE',
          'font-family:Alexandria,Segoe UI,Tahoma,sans-serif',
          'font-size:14px',
          'padding:12px 24px',
          'border-radius:12px',
          'box-shadow:0 4px 20px rgba(0,0,0,0.35)',
          'z-index:99999',
          'opacity:0',
          'transition:opacity 0.25s ease',
          'white-space:nowrap',
          'pointer-events:none'
        ].join(';');
        toastEl.textContent = 'اضغط مرة أخرى للخروج من التطبيق';
        document.body.appendChild(toastEl);
      }
      // أظهر
      clearTimeout(toastTimer);
      requestAnimationFrame(function() {
        toastEl.style.opacity = '1';
      });
      // أخفِ بعد ثانيتين
      toastTimer = setTimeout(function() {
        toastEl.style.opacity = '0';
        backPressCount = 0;  // إعادة تعيين عند انتهاء مهلة التلميح
      }, 2000);
    }

    /* ════════════════════════════════════════════
       PWA Install Prompt (Android)
    ════════════════════════════════════════════ */
    var deferredInstallPrompt = null;

    window.addEventListener('beforeinstallprompt', function(e) {
      e.preventDefault();
      deferredInstallPrompt = e;
      setTimeout(function() {
        if (deferredInstallPrompt) deferredInstallPrompt.prompt();
      }, 3000);
    });

    /* ════════════════════════════════════════════
       Boot Sequence
    ════════════════════════════════════════════ */
    document.addEventListener('DOMContentLoaded', function() {
      lockPortrait();
      loadApp();
      setupBackButton();

      // On first tap → fullscreen to hide browser bar
      document.addEventListener('touchstart', function onFirstTouch() {
        requestFullscreen();
        document.removeEventListener('touchstart', onFirstTouch);
      }, { once: true });

      document.addEventListener('click', function onFirstClick() {
        requestFullscreen();
        document.removeEventListener('click', onFirstClick);
      }, { once: true });
    });

    /* ════════════════════════════════════════════
       Service Worker Registration (for PWA caching)
    ════════════════════════════════════════════ */
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js').catch(function(err) {
          console.warn('SW registration failed:', err);
        });
      });
    }
  </script>

</body>
</html>
